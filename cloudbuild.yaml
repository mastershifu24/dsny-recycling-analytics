# Cloud Build: build root Dockerfile → Artifact Registry → Cloud Run.
# Create repo once (if missing):
#   gcloud artifacts repositories create cloud-run-source-deploy \
#     --repository-format=docker --location=us-central1 --description="Cloud Run images"
#
# Image tag uses COMMIT_SHA (always set on Git push triggers). SHORT_SHA can be empty on some triggers.
substitutions:
  _SERVICE_NAME: dsny-recycling-analytics
  _REGION: us-central1
  _AR_REPO: cloud-run-source-deploy

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA
      - .
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --set-env-vars
      - NYC_SODA_DATASET=ebb7-mvp5

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

# Pip + Docker can exceed default 10m on cold builds
timeout: 1800s

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$COMMIT_SHA
